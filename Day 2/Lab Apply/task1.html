        function createCourse(obj)
        {
            var defaultObj = {courseName:"ES6" , courseDuration:"3days", courseOwner:"JavaScript"};

            for (var elem in obj)
                if (!defaultObj[elem])
                    throw Exception(`You Passed Obj With Wrong Feild: ${elem}`);
            return obj;
        }
