<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var obj = {
            [Symbol.replace]: (caller) => caller.length > 15 ? caller.substr(0, 15) + "..." : caller
        }

        console.log("1234567890".replace(obj))
        console.log("123456789012345".replace(obj))
        console.log("1234567890123456789".replace(obj))
    </script>
</body>
</html>
